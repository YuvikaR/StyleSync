<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StyleSync - The Digital Atelier</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #2b1e14;
    --card-bg: #1a1208ee;
    --accent: #e8417a;
    --gold: #c9a96e;
    --text: #f0e8df;
    --muted: #8a7a6e;
    --input-bg: #2e2018;
    --input-border: #4a3828;
    --input-focus: #e8417a55;
    --footer-bg: #110d07;
  }

  ::-webkit-scrollbar { display: none; }
  html { scrollbar-width: none; }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 80% at 20% 60%, #5a3a1a55 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 80% 30%, #3a1a0a44 0%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 100%, #1a0a0033 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .blob {
    position: fixed;
    width: 420px;
    height: 420px;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    background: radial-gradient(ellipse at 40% 40%, #c9944e 0%, #7a4e2a 40%, #3a2010 80%, transparent 100%);
    border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
    filter: blur(2px);
    opacity: 0.55;
    animation: morphBlob 9s ease-in-out infinite alternate;
    z-index: 0;
  }

  @keyframes morphBlob {
    0% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
    33% { border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%; }
    66% { border-radius: 70% 30% 50% 50% / 40% 70% 30% 60%; }
    100% { border-radius: 50% 50% 40% 60% / 55% 45% 65% 35%; }
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 22px 36px;
    display: flex;
    align-items: center;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.04em;
    text-decoration: none;
  }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px 40px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: var(--card-bg);
    border: 1px solid #3a2818;
    border-radius: 18px;
    padding: 42px 38px 36px;
    backdrop-filter: blur(20px);
    box-shadow:
      0 0 0 1px #ffffff08,
      0 8px 40px #00000066,
      0 2px 8px #00000044;
    animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 400;
    margin-bottom: 8px;
    opacity: 0.85;
  }

  .card h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.15rem;
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
    margin-bottom: 6px;
  }

  .subtitle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 32px;
    letter-spacing: 0.01em;
  }

  .field {
    margin-bottom: 18px;
    position: relative;
  }

  .field label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
  }

  .field-row {
    display: flex;
    align-items: center;
    background: var(--input-bg);
    border: 1px solid var(--input-border);
    border-radius: 8px;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }

  .field-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--input-focus);
  }

  .field-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 11px 14px;
    font-size: 0.87rem;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
  }

  .field-row input::placeholder { color: #5a4a3a; }

  .toggle-pass {
    padding: 0 14px;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Jost', sans-serif;
    transition: color 0.2s;
  }

  .toggle-pass:hover { color: var(--text); }

  .forgot {
    display: block;
    text-align: right;
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 6px;
    cursor: pointer;
    transition: color 0.2s;
    text-decoration: none;
  }

  .forgot:hover { color: var(--gold); }

  .btn-signin {
    width: 100%;
    padding: 13px;
    background: linear-gradient(135deg, #e8417a 0%, #c4245d 100%);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 24px;
    margin-bottom: 22px;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 20px #e8417a44;
  }

  .btn-signin::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #f55d91 0%, #e8417a 100%);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .btn-signin:hover { transform: translateY(-1px); box-shadow: 0 6px 28px #e8417a66; }
  .btn-signin:hover::before { opacity: 1; }
  .btn-signin:active { transform: translateY(1px); }
  .btn-signin span { position: relative; z-index: 1; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    color: var(--muted);
    font-size: 0.68rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }

  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #3a2818;
  }

  .btn-google {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 11px;
    background: #1e1408;
    border: 1px solid #3a2818;
    border-radius: 8px;
    color: var(--text);
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    margin-bottom: 24px;
  }

  .btn-google:hover { background: #2a1c0e; border-color: #5a3e28; transform: translateY(-1px); }
  .btn-google:active { transform: translateY(0); }

  .google-icon {
    width: 18px;
    height: 18px;
  }

  .register-row {
    text-align: center;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .register-row a {
    color: var(--gold);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }

  .register-row a:hover { color: var(--accent); }

  .quote-area {
    padding: 0 36px 32px;
    text-align: left;
    animation: fadeUp 1s 0.3s cubic-bezier(.22,1,.36,1) both;
  }

  .quote-area blockquote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: #6a5a4e;
    line-height: 1.55;
    max-width: 260px;
  }

  footer {
    background: var(--footer-bg);
    padding: 16px 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-size: 0.65rem;
    color: #4a3a2e;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  footer .footer-links { display: flex; gap: 22px; }
  footer a { color: #4a3a2e; text-decoration: none; transition: color 0.2s; }
  footer a:hover { color: var(--gold); }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1a1208;
    border: 1px solid var(--accent);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.8rem;
    letter-spacing: 0.05em;
    z-index: 100;
    transition: transform 0.4s cubic-bezier(.22,1,.36,1), opacity 0.4s;
    opacity: 0;
    white-space: nowrap;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  img {
    width: 60px;
    height: 90px;
  }
</style>
</head>
<body>
<div class="page">
  <div class="blob"></div>

  <header>
    <a class="logo" href="index.html"><img src="Home_images/logo.png" alt="logo" /></a>
  </header>

  <main>
    <div class="card">
      <p class="eyebrow">The Digital Atelier</p>
      <h1>Welcome Back</h1>
      <p class="subtitle">Access your curated style portfolio</p>

      <div class="field">
        <label>Email Address</label>
        <div class="field-row">
          <input type="email" id="email" placeholder="atelier@stylesync.com" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="field-row">
          <input type="password" id="password" placeholder="........" autocomplete="current-password"/>
          <button class="toggle-pass" type="button" onclick="togglePass()" id="toggleBtn">Show</button>
        </div>
        <a href="#" class="forgot" onclick="showToast('Password reset link sent to your inbox.'); return false;">Forgot?</a>
      </div>

      <button class="btn-signin" type="button" onclick="handleSignIn()">
        <span>Sign In</span>
      </button>

      <div class="divider">or continue with</div>

      <button class="btn-google" type="button" onclick="showToast('Redirecting to Google...')">
        <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <p class="register-row">New here? <a href="register.html" onclick="showToast('Redirecting to registration...'); return true;">Create Account</a></p>
    </div>
  </main>

  <div class="quote-area">
    <blockquote>"Style is a way to say who you are without having to speak."</blockquote>
  </div>

  <footer>
    <span>&copy; 2026 StyleSync - The Digital Atelier</span>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Help Center</a>
    </div>
  </footer>
</div>

<div class="toast" id="toast"></div>

<script>
  function showToast(message) {
    const toast = document.getElementById('toast');
    if (!toast) return;

    toast.textContent = message;
    toast.classList.add('show');

    clearTimeout(showToast.timeoutId);
    showToast.timeoutId = setTimeout(() => {
      toast.classList.remove('show');
    }, 2500);
  }

  function togglePass() {
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggleBtn');
    if (!passwordInput || !toggleBtn) return;

    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    toggleBtn.textContent = isPassword ? 'Hide' : 'Show';
  }

  function handleSignIn() {
    const emailInput = document.getElementById('email');
    const passInput = document.getElementById('password');
    if (!emailInput || !passInput) return;

    const email = emailInput.value.trim();
    const password = passInput.value.trim();

    if (!email || !password) {
      showToast('Please enter your email and password.');
      return;
    }

    localStorage.setItem('isLoggedIn', 'true');
    localStorage.setItem('userName', email.split('@')[0] || 'Member');
    localStorage.setItem('userRole', 'Pro Member');

    showToast('Login successful.');

    if (window.parent && window.parent !== window) {
      window.parent.postMessage({ type: 'LOGIN_SUCCESS' }, '*');
      return;
    }

    window.location.href = 'index.html';
  }
</script>
</body>
</html>
